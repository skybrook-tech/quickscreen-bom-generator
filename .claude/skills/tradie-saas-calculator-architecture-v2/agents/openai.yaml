interface:
  display_name: 'Tradie SaaS calculator architecture'
  short_description: 'Use when designing or refactoring the engine of a parametric calculator app that ingests supplier da'
  default_prompt: 'Use this skill for: Use when designing or refactoring the engine of a parametric calculator app that ingests supplier data and emits Bills of Materials. Triggers when the user wants to (a) lock the schema for a new tradie SaaS calculator (decking, paving, fencing, painting), (b) refactor the BOM dispatcher, (c) design seed data for a new supplier or system, (d) handle scope-attributed line items (per-source quantity tracking for filtering), (e) categorise BOM output for readable presentation, (f) bake in optional accessories with many-to-many parent links, (g) track calculation completeness with the 5-state status model, (h) enforce source discipline across multiple evidence sources. Captures the 3-layer schema (geometry / system / product attribute), the canonical 4-state rule taxonomy, per-SKU quantity-tier pricing, BB- bulk-buy variants, all the canonical math (slat+gap-3, gate weight + 30% safety, FFD bin-packing), scope-attributed line items, BOM categorisation taxonomy (category / subCategory / companionOf / sortPriority), the optional-accessory schema, and calculation-status tracking.'
