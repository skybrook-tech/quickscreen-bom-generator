interface:
  display_name: 'Editorial design system'
  short_description: 'Use when establishing or refining the design language for a SaaS app — particularly tradie / B2B cal'
  default_prompt: 'Use this skill for: Use when establishing or refining the design language for a SaaS app — particularly tradie / B2B calculators / professional tools where the interior should feel editorial, calm, and trustworthy. Triggers when the user wants to (a) lock in design tokens, (b) pick typography/radii/density, (c) handle color hover-codes, (d) build state-aware onboarding hint cards, (e) build parse-preview chips for natural-language entry, (f) visually distinguish AI-generated content from user-drawn content, (g) prototype-as-spec before writing PR briefs. Captures the brand-* token contract, Geist/Inter typography rules, rounded-lg-actions / rounded-full-chips conventions, color-letter-codes-with-hover pattern, tabular-nums for financial display, parse-preview chips with 4 confidence states, AI-starter visual distinction, state-aware onboarding 6-state model, and the prototype-as-spec workflow.'
