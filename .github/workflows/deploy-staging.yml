name: Deploy (staging)

# Pushes migrations + edge functions to the STAGING Supabase project and seeds
# its catalogue, so the staging Netlify site has a working schema + data.
#
# Trigger: every merge into `staging` (the salvage integration branch), plus a
# manual run. Netlify rebuilds the staging site automatically from the repo.
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   STAGING_SUPABASE_PROJECT_REF       — e.g. pmgfbvpiozvpezmtqhuz
#   STAGING_SUPABASE_DB_PASSWORD       — the project's Postgres password (db push)
#   STAGING_SUPABASE_SERVICE_ROLE_KEY  — service-role key (seeding only)
#   SUPABASE_ACCESS_TOKEN              — CLI personal access token (also used by prod deploy)
#
# Safety: the seed scripts carry a production-DB guard, and the staging project
# is NOT on that denylist, so seeding runs. They will REFUSE to touch the prod
# project (dsjtihvefcteftuxvowt) even if a ref is mis-set.

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      seed_auth:
        description: "Also (re)create the test + admin auth users (seed:auth is not idempotent — only for first-time setup)"
        type: boolean
        default: false

jobs:
  staging:
    name: Staging — migrate, deploy functions, seed
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          # Pinned for parity with db:reset / CI — see issue #97.
          version: 2.104.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Link staging project
        run: supabase link --project-ref ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}

      - name: Push migrations
        run: supabase db push

      - name: Deploy edge functions
        run: supabase functions deploy --no-verify-jwt bom-calculator bom-calculator-static calculate-pricing search-products embed-quote

      - name: Seed products + pricing (idempotent upsert)
        run: npm run seed:products
        env:
          VITE_SUPABASE_URL: https://${{ secrets.STAGING_SUPABASE_PROJECT_REF }}.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Seed auth users (manual dispatch only — not idempotent)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.seed_auth }}
        run: npm run seed:auth
        env:
          VITE_SUPABASE_URL: https://${{ secrets.STAGING_SUPABASE_PROJECT_REF }}.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
