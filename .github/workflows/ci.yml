name: CI

on:
  pull_request:
    # Salvage workflow: phase PRs target `staging`; master stays frozen until
    # Phase E is proven on staging. Run CI for PRs into either branch.
    branches: [master, staging]
  push:
    # Validate the integrated state whenever a phase merges into staging.
    branches: [staging]

jobs:
  build:
    name: TypeScript check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # Pure unit tests for the multi-supplier + pricing libs ported in salvage
      # Phase A. No DB / DOM dependency — safe to run in the build job.
      - run: npm run test:lib

  integration:
    name: Deno integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          # Pinned: supabase CLI 2.106.0 regressed service_role access to
          # RLS-enabled tables (db:reset seed fails with "permission denied for
          # table organisations"). 2.104.0 is the last known-good for this repo's
          # seed flow. db:reset/setup/db:push-remote are pinned to the same
          # version in package.json — keep all four in sync.
          # Tracking issue: #97 (revisit when the upstream regression is fixed).
          version: 2.104.0

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Start Supabase
        run: supabase start

      - name: Export Supabase keys
        run: |
          STATUS=$(supabase status --output json)
          echo "VITE_SUPABASE_URL=http://localhost:54321"           >> $GITHUB_ENV
          echo "SUPABASE_URL=http://localhost:54321"                >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$(echo "$STATUS" | jq -r '.ANON_KEY')"          >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_ENV

      - name: Reset DB + seed
        run: npm run db:reset

      # Salvage Phase A: assert supplier/org data isolation across the catalogue +
      # pricing surface (anon / org-A / org-B / admin). Business-ending if it fails.
      - name: RLS matrix
        run: npm run test:rls

      - name: Serve edge functions
        run: supabase functions serve --no-verify-jwt &

      - name: Wait for edge runtime
        run: sleep 5

      - name: Run Deno tests
        run: npm run test:integration
        env:
          TEST_USER_EMAIL: test@glass-outlet.com
          TEST_USER_PASSWORD: "123456"

      - name: Stop Supabase
        run: supabase stop
        if: always()
