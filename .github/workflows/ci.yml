name: CI

on:
  pull_request:
    branches: [master]

jobs:
  build:
    name: TypeScript check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

  db-integration:
    name: DB integration tests (seeded catalogue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Start Supabase
        run: supabase start

      - name: Export Supabase keys
        run: |
          STATUS=$(supabase status --output json)
          echo "VITE_SUPABASE_URL=http://localhost:54321"           >> $GITHUB_ENV
          echo "SUPABASE_URL=http://localhost:54321"                >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$(echo "$STATUS" | jq -r '.ANON_KEY')"          >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_ENV

      - name: Reset DB + seed
        run: npm run db:reset

      # Runs the edge function's own loaders + engine (db.ts + engine.ts)
      # against the seeded DB and asserts on emitted components (sku + qty,
      # prices ignored). Covers what the offline suite can't: loader
      # pagination and SKU resolution against the real seeded catalogue.
      - name: Run DB integration tests
        run: RUN_DB_TESTS=1 deno test --allow-read --allow-env --allow-net supabase/functions/bom-calculator-static/integration_db_test.ts

      - name: Run engine tests
        run: deno test --allow-read --allow-env supabase/functions/bom-calculator-static/
        
      - name: Stop Supabase
        run: supabase stop
        if: always()
