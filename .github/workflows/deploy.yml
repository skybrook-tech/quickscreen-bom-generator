name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Supabase: run migrations + deploy edge functions
  # Netlify build/deploy is handled automatically by the connected repo (netlify.toml)
  supabase:
    name: Supabase — Migrate & Deploy Functions
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.30.4

      - name: Validate config
        run: |
          [ -n "${{ vars.SUPABASE_PROJECT_REF }}" ] || { echo "SUPABASE_PROJECT_REF variable not set"; exit 1; }
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || { echo "SUPABASE_ACCESS_TOKEN secret not set"; exit 1; }
          [ -n "$SUPABASE_DB_PASSWORD" ] || { echo "SUPABASE_DB_PASSWORD secret not set"; exit 1; }

      - name: Link project
        run: supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}

      - name: Run database migrations
        run: supabase db push

      - name: Deploy edge functions
        run: supabase functions deploy --no-verify-jwt bom-calculator-static get-calculator-config search-products