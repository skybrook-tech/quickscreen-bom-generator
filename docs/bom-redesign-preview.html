<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickScreen BOM — Redesign Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18",
      "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime",
      "react-dom/client": "https://esm.sh/react-dom@18/client",
      "lucide-react": "https://esm.sh/lucide-react@0.344.0"
    }
  }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useMemo } from "react";
    import {
      Plus, Copy, Trash2, ChevronDown, ChevronRight, Settings2,
      Map as MapIcon, Save, Printer, Download, Sun, Moon,
      GripVertical, DoorOpen, Edit2, RotateCcw
    } from "lucide-react";
    import { createRoot } from "react-dom/client";

    // ---------- Data ----------
    const COLOURS = [
      { code: "B", name: "Black Satin", hex: "#1a1a1a", text: "#fff" },
      { code: "MN", name: "Monument Matt", hex: "#3a3d40", text: "#fff" },
      { code: "G", name: "Woodland Grey Matt", hex: "#4d4f4c", text: "#fff" },
      { code: "SM", name: "Surfmist Matt", hex: "#dcd9d0", text: "#222" },
      { code: "W", name: "Pearl White Gloss", hex: "#f1efe9", text: "#222" },
      { code: "BS", name: "Basalt Satin", hex: "#3d4146", text: "#fff" },
      { code: "D", name: "Dune Satin", hex: "#a8a193", text: "#222" },
      { code: "M", name: "Mill (raw aluminium)", hex: "#bfc0c0", text: "#222" },
      { code: "P", name: "Primrose", hex: "#e6d6a4", text: "#222", limited: true },
      { code: "PB", name: "Paperbark", hex: "#c8b89a", text: "#222", limited: true },
      { code: "S", name: "Palladium Silver Pearl", hex: "#b8b8b8", text: "#222" },
    ];

    const GAPS = [
      { v: 5, label: "5mm", hint: "near privacy" },
      { v: 9, label: "9mm", hint: "standard" },
      { v: 12, label: "12mm" },
      { v: 15, label: "15mm" },
      { v: 20, label: "20mm", hint: "open" },
      { v: 30, label: "30mm" },
    ];

    const makeSegment = (i) => ({
      id: crypto.randomUUID(),
      number: i,
      length: 3.0,
      height: 1800,
      postSpacing: 3000,
      override: null,
      leftTermination: "post",
      rightTermination: "post",
    });

    const initialJob = {
      name: "",
      system: "QSHS",
      slatRange: "standard",
      colour: "B",
      slatSize: 65,
      gap: 5,
      postColour: "same",
      maxPanelWidth: 3000,
      postMounting: "concreted",
      postSize: 50,
      segments: [makeSegment(1), makeSegment(2), makeSegment(3)],
    };

    // ---------- Helpers ----------
    const fmtMoney = (n) =>
      n.toLocaleString("en-AU", { style: "currency", currency: "AUD" });

    const computeRunSummary = (job) => {
      const totalLength = job.segments.reduce((s, x) => s + x.length, 0);
      const maxHeight = Math.max(0, ...job.segments.map((x) => x.height));
      const slatPlusGap = job.slatSize + job.gap;
      const slatCount = Math.floor(maxHeight / slatPlusGap);
      const actualHeight = slatCount * job.slatSize + Math.max(0, slatCount - 1) * job.gap;
      const panels = job.segments.reduce(
        (s, x) => s + Math.max(1, Math.ceil((x.length * 1000) / x.postSpacing)),
        0
      );
      const posts = panels + job.segments.length;
      const corners = 0;
      return { totalLength, maxHeight, actualHeight, panels, posts, corners };
    };

    const generateBOM = (job) => {
      const { totalLength, panels, posts } = computeRunSummary(job);
      const slatPlusGap = job.slatSize + job.gap;
      const slatRows = Math.floor((job.segments[0]?.height || 0) / slatPlusGap);
      const colour = COLOURS.find((c) => c.code === job.colour);

      const items = [
        {
          category: "Posts",
          sku: `${job.system}-POST-${job.postSize}-${job.colour}`,
          desc: `${job.postSize}×${job.postSize}mm aluminium full post 2400mm long`,
          qty: posts, unit: "each", unitPrice: 38.0,
        },
        {
          category: "Slats",
          sku: `${job.system}-SLAT-${job.slatSize}-${job.colour}`,
          desc: `${job.slatSize}mm horizontal slat with centre web, 5800mm stock — ${colour?.name}`,
          qty: slatRows * job.segments.length, unit: "length", unitPrice: 42.5,
        },
        {
          category: "Side frames",
          sku: `${job.system}-SFR-${job.colour}`,
          desc: `27×26mm QuickScreen side frame, 5800mm stock — ${colour?.name}`,
          qty: Math.ceil(panels * 2), unit: "length", unitPrice: 24.35,
        },
        {
          category: "Cfc covers",
          sku: `${job.system}-CFC-${job.colour}`,
          desc: `Snap-on CFC, 5800mm stock — ${colour?.name}`,
          qty: Math.ceil(panels * 2), unit: "length", unitPrice: 16.92,
        },
        {
          category: "Accessories",
          sku: `${job.system}-SFC-${job.colour}`,
          desc: `Nylon side frame cap, sold individually (add 2 per side frame)`,
          qty: panels * 4, unit: "each", unitPrice: 0.86,
        },
        {
          category: "Accessories",
          sku: `${job.system}-SPACER-${job.gap}MM`,
          desc: `QuickScreen snap-in spacer for ${job.gap}mm slat gap, 50 pack`,
          qty: Math.ceil((slatRows * panels) / 40), unit: "pack", unitPrice: 1.42,
        },
        {
          category: "Screws",
          sku: `${job.system}-SCREW-50PK`,
          desc: `QuickScreen 10g×16mm screws, 50 pack`,
          qty: Math.ceil(posts * 2 / 40), unit: "pack", unitPrice: 1.42,
        },
        {
          category: job.postMounting === "concreted" ? "Fixing" : "Fixing",
          sku: `FIX-${job.postMounting === "concreted" ? "CON" : "BP"}`,
          desc: job.postMounting === "concreted" ? "Concrete mix (post hole)" : "Base plate kit",
          qty: posts, unit: job.postMounting === "concreted" ? "bag" : "kit", unitPrice: job.postMounting === "concreted" ? 12 : 28,
        },
      ].map((it) => ({ ...it, price: it.qty * it.unitPrice }));

      const subtotal = items.reduce((s, x) => s + x.price, 0);
      const gst = subtotal * 0.1;

      const suggested = [
        {
          sku: `${job.system}-POST-FL-6M`,
          name: `${job.postSize}×${job.postSize}mm aluminium full post 6000mm long; top plate sold separately`,
          desc: "Optional: full-length post stock if the installer wants to cut posts on site.",
          qty: 1, unitPrice: 81.44,
        },
        {
          sku: `${job.system}-CSR-BP`,
          name: `Centre support rail base/top plate incl. 2× CS screws`,
          desc: "Optional: centre support rail top/base plates are suggested, not added to the standard BOM.",
          qty: panels * 2, unitPrice: 4.64,
        },
        {
          sku: `PAINT-${job.colour}`,
          name: `Touch up paint spray can — ${colour?.name}`,
          desc: "Suggested for colour-matched touch-ups after cutting and installation.",
          qty: 1, unitPrice: 11.35,
        },
      ];

      return { items, subtotal, gst, total: subtotal + gst, suggested };
    };

    // ---------- UI primitives ----------
    const Segmented = ({ value, onChange, options, size = "md" }) => (
      <div className={`inline-flex rounded-lg bg-neutral-100 dark:bg-neutral-800 p-0.5 ${size === "sm" ? "text-xs" : "text-sm"}`}>
        {options.map((o) => (
          <button
            key={o.value}
            onClick={() => onChange(o.value)}
            className={`${size === "sm" ? "px-2.5 py-1" : "px-3 py-1.5"} rounded-md transition-all font-medium ${value === o.value
              ? "bg-white dark:bg-neutral-700 text-neutral-900 dark:text-white shadow-sm"
              : "text-neutral-600 dark:text-neutral-400 hover:text-neutral-900 dark:hover:text-white"
              }`}
          >
            {o.label}
          </button>
        ))}
      </div>
    );

    const ColourSwatches = ({ value, onChange }) => (
      <div className="grid grid-cols-11 gap-1.5">
        {COLOURS.map((c) => {
          const selected = value === c.code;
          return (
            <button
              key={c.code}
              onClick={() => onChange(c.code)}
              title={`${c.name}${c.limited ? " (limited)" : ""}`}
              className={`relative aspect-square rounded-md transition-all ${selected
                ? "ring-2 ring-blue-600 ring-offset-2 ring-offset-white dark:ring-offset-neutral-900 scale-105"
                : "ring-1 ring-neutral-200 dark:ring-neutral-700 hover:scale-105"
                }`}
              style={{ backgroundColor: c.hex }}
            >
              {c.limited && (
                <span className="absolute -top-1 -right-1 w-2 h-2 rounded-full bg-amber-500 ring-1 ring-white dark:ring-neutral-900" />
              )}
              {selected && (
                <span
                  className="absolute inset-0 flex items-center justify-center text-[10px] font-bold"
                  style={{ color: c.text }}
                >
                  {c.code}
                </span>
              )}
            </button>
          );
        })}
      </div>
    );

    const Field = ({ label, children, hint }) => (
      <div className="space-y-1.5">
        <label className="text-[11px] font-medium uppercase tracking-wider text-neutral-500 dark:text-neutral-400">
          {label}
        </label>
        {children}
        {hint && <p className="text-xs text-neutral-500">{hint}</p>}
      </div>
    );

    const NumInput = ({ value, onChange, suffix, className = "" }) => (
      <div className="relative">
        <input
          type="number"
          value={value}
          onChange={(e) => onChange(parseFloat(e.target.value) || 0)}
          className={`w-full px-3 py-2 ${suffix ? "pr-12" : ""} rounded-lg bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 text-sm font-mono tabular-nums focus:border-blue-600 focus:ring-2 focus:ring-blue-600/20 outline-none transition ${className}`}
        />
        {suffix && (
          <span className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-neutral-500 font-medium pointer-events-none">
            {suffix}
          </span>
        )}
      </div>
    );

    const Section = ({ title, children, action }) => (
      <section className="space-y-2.5">
        <div className="flex items-center justify-between">
          <h3 className="text-[11px] font-semibold uppercase tracking-wider text-neutral-700 dark:text-neutral-300">
            {title}
          </h3>
          {action}
        </div>
        {children}
      </section>
    );

    // ---------- Inline editable value ----------
    const InlineEdit = ({ value, suffix, onCommit, displayValue }) => {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState("");
      const inputRef = React.useRef(null);

      const start = (e) => {
        e.stopPropagation();
        setDraft(String(value));
        setEditing(true);
        // focus after render
        setTimeout(() => inputRef.current?.select(), 0);
      };

      const commit = () => {
        const n = parseFloat(draft);
        if (!isNaN(n) && n > 0) onCommit(n);
        setEditing(false);
      };

      const cancel = () => setEditing(false);

      if (editing) {
        return (
          <span className="inline-flex items-center gap-0.5" onClick={(e) => e.stopPropagation()}>
            <input
              ref={inputRef}
              type="number"
              value={draft}
              onChange={(e) => setDraft(e.target.value)}
              onBlur={commit}
              onKeyDown={(e) => {
                if (e.key === "Enter") { e.preventDefault(); commit(); }
                if (e.key === "Escape") { e.preventDefault(); cancel(); }
              }}
              className="w-16 px-1 py-0 rounded border border-blue-500 bg-white dark:bg-neutral-800 text-sm font-mono tabular-nums text-blue-600 dark:text-blue-400 outline-none focus:ring-2 focus:ring-blue-500/30"
              style={{ appearance: "textfield" }}
            />
            <span className="text-xs text-blue-500 font-medium">{suffix}</span>
          </span>
        );
      }

      return (
        <span
          onClick={start}
          title="Click to edit"
          className="group/inline relative inline-flex items-center gap-0.5 cursor-text rounded px-0.5 -mx-0.5 hover:bg-blue-50 dark:hover:bg-blue-950/40 transition-colors"
        >
          <span className="font-mono text-sm tabular-nums group-hover/inline:text-blue-600 dark:group-hover/inline:text-blue-400 transition-colors">
            {displayValue ?? value}
          </span>
          <span className="text-xs font-mono group-hover/inline:text-blue-600 dark:group-hover/inline:text-blue-400 transition-colors">
            {suffix}
          </span>
          <Edit2
            size={9}
            className="opacity-0 group-hover/inline:opacity-60 text-blue-500 transition-opacity absolute -top-1.5 -right-2"
          />
        </span>
      );
    };

    // ---------- Segment row ----------
    const SegmentRow = ({ seg, onChange, onRemove, onDuplicate }) => {
      const [open, setOpen] = useState(false);
      const [showOverrides, setShowOverrides] = useState(false);
      const panels = Math.max(1, Math.ceil((seg.length * 1000) / seg.postSpacing));
      const hasOverride = !!seg.override;

      return (
        <div className="rounded-lg border border-neutral-200 bg-slate-100 dark:border-neutral-700 dark:bg-neutral-900 overflow-hidden">
          <div
            className="flex items-center gap-2 px-3 py-2.5 hover:bg-slate-50 dark:hover:bg-neutral-800/50"
          >
            <button
              onClick={() => setOpen((o) => !o)}
              className="text-neutral-400 hover:text-neutral-700 dark:hover:text-neutral-200 cursor-pointer"
            >
              {open ? <ChevronDown size={14} /> : <ChevronRight size={14} />}
            </button>
            <GripVertical size={14} className="text-neutral-300 dark:text-neutral-600 cursor-grab" />
            <span
              className="font-mono text-xs font-semibold text-neutral-500 w-6 cursor-pointer"
              onClick={() => setOpen((o) => !o)}
            >
              #{seg.number}
            </span>
            <InlineEdit
              value={seg.length}
              suffix="m"
              displayValue={seg.length.toFixed(2)}
              onCommit={(v) => onChange({ ...seg, length: v })}
            />
            <span className="text-neutral-300 dark:text-neutral-600">·</span>
            <InlineEdit
              value={seg.height}
              suffix="mm"
              onCommit={(v) => onChange({ ...seg, height: v })}
            />
            <span className="text-neutral-300 dark:text-neutral-600">·</span>
            <span
              className="text-xs text-neutral-500 cursor-pointer"
              onClick={() => setOpen((o) => !o)}
            >
              {panels} panel{panels !== 1 ? "s" : ""}
            </span>
            {hasOverride && (
              <span className="ml-1 text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300 font-medium">
                override
              </span>
            )}
            <div className="flex-1" onClick={() => setOpen((o) => !o)} />
            <button
              onClick={(e) => { e.stopPropagation(); onDuplicate(); }}
              title="Duplicate"
              className="p-1.5 text-neutral-400 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/20 rounded"
            >
              <Copy size={13} />
            </button>
            <button
              onClick={(e) => { e.stopPropagation(); onRemove(); }}
              title="Remove"
              className="p-1.5 text-neutral-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded"
            >
              <Trash2 size={13} />
            </button>
          </div>

          {open && (
            <div className="border-t border-neutral-200 dark:border-neutral-700 p-3 bg-neutral-50/50 dark:bg-neutral-800/30 space-y-3">
              <div className="grid grid-cols-3 gap-3">
                <Field label="Length">
                  <NumInput
                    value={seg.length}
                    onChange={(v) => onChange({ ...seg, length: v })}
                    suffix="m"
                  />
                </Field>
                <Field label="Height">
                  <NumInput
                    value={seg.height}
                    onChange={(v) => onChange({ ...seg, height: v })}
                    suffix="mm"
                  />
                </Field>
                <Field label="Max post spacing">
                  <NumInput
                    value={seg.postSpacing}
                    onChange={(v) => onChange({ ...seg, postSpacing: v })}
                    suffix="mm"
                  />
                </Field>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Left termination">
                  <select
                    value={seg.leftTermination}
                    onChange={(e) => onChange({ ...seg, leftTermination: e.target.value })}
                    className="w-full px-3 py-2 rounded-lg bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 text-sm focus:border-blue-600 focus:ring-2 focus:ring-blue-600/20 outline-none"
                  >
                    <option value="post">Standard post</option>
                    <option value="wall">Wall mount</option>
                    <option value="corner">Corner post</option>
                    <option value="gate">Gate hinge</option>
                  </select>
                </Field>
                <Field label="Right termination">
                  <select
                    value={seg.rightTermination}
                    onChange={(e) => onChange({ ...seg, rightTermination: e.target.value })}
                    className="w-full px-3 py-2 rounded-lg bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 text-sm focus:border-blue-600 focus:ring-2 focus:ring-blue-600/20 outline-none"
                  >
                    <option value="post">Standard post</option>
                    <option value="wall">Wall mount</option>
                    <option value="corner">Corner post</option>
                    <option value="gate">Gate latch</option>
                  </select>
                </Field>
              </div>

              {!showOverrides && !hasOverride && (
                <button
                  onClick={() => setShowOverrides(true)}
                  className="text-xs text-blue-600 dark:text-blue-400 hover:underline flex items-center gap-1"
                >
                  <Settings2 size={12} />
                  Add segment overrides (colour, slat size, gap)
                </button>
              )}
              {(showOverrides || hasOverride) && (
                <div className="rounded-lg bg-amber-50/50 dark:bg-amber-950/20 border border-amber-200 dark:border-amber-900/50 p-3 space-y-2">
                  <div className="flex items-center justify-between">
                    <span className="text-[11px] font-semibold uppercase tracking-wider text-amber-700 dark:text-amber-400">
                      Segment overrides
                    </span>
                    <button
                      onClick={() => { setShowOverrides(false); onChange({ ...seg, override: null }); }}
                      className="text-xs text-amber-700 dark:text-amber-400 hover:underline flex items-center gap-1"
                    >
                      <RotateCcw size={11} /> Reset
                    </button>
                  </div>
                  <p className="text-xs text-neutral-600 dark:text-neutral-400">
                    Override-specific controls go here (colour, slat size, gap, stock lengths).
                  </p>
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    // ---------- Tab bar ----------
    const TABS = [
      { id: "style", label: "Style" },
      { id: "posts", label: "Posts & mounting" },
      { id: "defaults", label: "Defaults" },
    ];

    const TabBar = ({ active, onChange }) => (
      <div className="flex border-b border-neutral-200 dark:border-neutral-800 px-4">
        {TABS.map((t) => (
          <button
            key={t.id}
            onClick={() => onChange(t.id)}
            className={`px-3 py-2.5 text-xs font-medium border-b-2 -mb-px transition-colors ${active === t.id
              ? "border-blue-600 text-blue-600 dark:text-blue-400"
              : "border-transparent text-neutral-500 dark:text-neutral-400 hover:text-neutral-800 dark:hover:text-neutral-200"
              }`}
          >
            {t.label}
          </button>
        ))}
      </div>
    );

    // ---------- Run card ----------
    const RunCard = ({ job, onChange, summary }) => {
      const [editing, setEditing] = useState(false);
      const [tab, setTab] = useState("style");
      const colour = COLOURS.find((c) => c.code === job.colour);

      const updateJob = (patch) => onChange({ ...job, ...patch });
      const updateSegment = (idx, next) =>
        onChange({
          ...job,
          segments: job.segments.map((s, i) => (i === idx ? next : s)),
        });
      const removeSegment = (idx) =>
        onChange({
          ...job,
          segments: job.segments
            .filter((_, i) => i !== idx)
            .map((s, i) => ({ ...s, number: i + 1 })),
        });
      const duplicateSegment = (idx) => {
        const copy = { ...job.segments[idx], id: crypto.randomUUID() };
        const next = [...job.segments];
        next.splice(idx + 1, 0, copy);
        onChange({
          ...job,
          segments: next.map((s, i) => ({ ...s, number: i + 1 })),
        });
      };
      const addSegment = () => {
        const n = job.segments.length + 1;
        onChange({
          ...job,
          segments: [
            ...job.segments,
            {
              ...makeSegment(n),
              height: job.defaultHeight ?? 1800,
              postSpacing: job.defaultPostSpacing ?? 3000,
              leftTermination: job.defaultLeftTermination ?? "post",
              rightTermination: job.defaultRightTermination ?? "post",
            },
          ],
        });
      };

      return (
        <div className="rounded-xl border border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 overflow-hidden">
          {/* Run header — title + stats only, no button */}
          <div className="px-4 py-3 border-b border-neutral-200 dark:border-neutral-800 flex items-center gap-3">
            <div className="flex-1 min-w-0 flex items-center flex-wrap gap-x-2 gap-y-1">
              <h2 className="font-semibold text-base">Run 1</h2>
              <span className="text-xs px-2 py-0.5 rounded-md bg-blue-50 dark:bg-blue-950/40 text-blue-700 dark:text-blue-300 font-medium">
                {job.system}
              </span>
              <div className="flex flex-wrap gap-x-2 gap-y-1 text-xs text-neutral-600 dark:text-neutral-400">
                <span>{summary.totalLength.toFixed(2)}m total</span>
                <span>·</span>
                <span>{summary.actualHeight}mm actual</span>
                <span>·</span>
                <span>{job.segments.length} segments</span>
                <span>·</span>
                <span>{summary.panels} panels</span>
                <span>·</span>
                <span>{summary.posts} posts</span>
              </div>
            </div>
          </div>

          {/* Sub-header: always rendered, button always in same spot */}
          <div className="border-b border-neutral-200 dark:border-neutral-800 flex items-center min-h-[40px]">
            <div className="flex-1 overflow-hidden">
              {!editing && (
                <div className="flex flex-wrap items-center gap-x-4 gap-y-1 px-4 py-2 text-xs text-neutral-600 dark:text-neutral-400 font-mono tabular-nums">
                  <span className="flex items-center gap-1">
                    <span
                      className="w-2.5 h-2.5 rounded-sm ring-1 ring-neutral-300 dark:ring-neutral-700"
                      style={{ backgroundColor: colour?.hex }}
                    />
                    {job.colour}
                  </span>
                  <span>·</span>
                  <span>{job.slatSize}mm slat</span>
                  <span>·</span>
                  <span>{job.gap}mm gap</span>
                  <span>·</span>
                  <span>{job.postSize}×{job.postSize}mm post</span>

                      <Section title="Slat gap">

                                ? "bg-blue-600 text-white"

                            >
                              {g.label}
                              {g.hint && (
                                <span className="ml-1 opacity-70">{g.hint}</span>
                              )}
                            </button>
                          ))}
                        </div>
                      </Section>
                    </div>
                  </>
                )}

                {tab === "posts" && (
                  <div className="grid grid-cols-2 gap-3">
                    <Field label="Mounting">
                      <Segmented
                        size="sm"
                        value={job.postMounting}
                        onChange={(v) => updateJob({ postMounting: v })}
                        options={[
                          { value: "concreted", label: "Concrete" },
                          { value: "baseplated", label: "Base-plate" },
                          { value: "coredrilled", label: "Core-drill" },
                        ]}
                      />
                    </Field>
                    <Field label="Post size">
                      <Segmented
                        size="sm"
                        value={job.postSize}
                        onChange={(v) => updateJob({ postSize: v })}
                        options={[
                          { value: 50, label: "50×50" },
                          { value: 65, label: "65×65 HD" },
                        ]}
                      />
                    </Field>
                    <Field label="Post colour">
                      <select
                        value={job.postColour}
                        onChange={(e) => updateJob({ postColour: e.target.value })}
                        className="w-full px-3 py-2 rounded-lg bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 text-sm focus:border-blue-600 focus:ring-2 focus:ring-blue-600/20 outline-none"
                      >
                        <option value="same">Same as fence ({job.colour})</option>
                        <option value="contrast">Contrasting colour</option>
                      </select>
                    </Field>
                    <Field label="Max panel width">
                      <NumInput
                        value={job.maxPanelWidth}
                        onChange={(v) => updateJob({ maxPanelWidth: v })}
                        suffix="mm"
                      />
                    </Field>
                  </div>
                )}

                {tab === "defaults" && (
                  <div className="space-y-4">
                    <p className="text-xs text-neutral-500 dark:text-neutral-400">
                      Applied to new segments when added. Existing segments are not affected.
                    </p>
                    <div className="grid grid-cols-2 gap-3">
                      <Field label="Default height">
                        <NumInput
                          value={job.defaultHeight ?? 1800}
                          onChange={(v) => updateJob({ defaultHeight: v })}
                          suffix="mm"
                        />
                      </Field>
                      <Field label="Default post spacing">
                        <NumInput
                          value={job.defaultPostSpacing ?? 3000}
                          onChange={(v) => updateJob({ defaultPostSpacing: v })}
                          suffix="mm"
                        />
                      </Field>
                      <Field label="Default left termination">
                        <select
                          value={job.defaultLeftTermination ?? "post"}
                          onChange={(e) => updateJob({ defaultLeftTermination: e.target.value })}
                          className="w-full px-3 py-2 rounded-lg bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 text-sm focus:border-blue-600 focus:ring-2 focus:ring-blue-600/20 outline-none"
                        >
                          <option value="post">Standard post</option>
                          <option value="wall">Wall mount</option>
                          <option value="corner">Corner post</option>
                          <option value="gate">Gate hinge</option>
                        </select>
                      </Field>
                      <Field label="Default right termination">
                        <select
                          value={job.defaultRightTermination ?? "post"}
                          onChange={(e) => updateJob({ defaultRightTermination: e.target.value })}
                          className="w-full px-3 py-2 rounded-lg bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 text-sm focus:border-blue-600 focus:ring-2 focus:ring-blue-600/20 outline-none"
                        >
                          <option value="post">Standard post</option>
                          <option value="wall">Wall mount</option>
                          <option value="corner">Corner post</option>
                          <option value="gate">Gate latch</option>
                        </select>
                      </Field>
                    </div>
                  </div>
                )}
              </div>


            </>
          )}
          {/* Segments — always visible below tabs */}
          {!editing && (
            < div className="dark:border-neutral-800 p-4 space-y-3">
              <Section
                title={`Segments (${job.segments.length})`}
                action={
                  <span className="text-[11px] text-neutral-500">Click row to expand</span>
                }
              >
                <div className="space-y-2">
                  {job.segments.map((seg, idx) => (
                    <SegmentRow
                      key={seg.id}
                      seg={seg}
                      onChange={(s) => updateSegment(idx, s)}
                      onRemove={() => removeSegment(idx)}
                      onDuplicate={() => duplicateSegment(idx)}
                    />

                </div>
                <div className="flex gap-2 pt-1">
                  <button
                    onClick={addSegment}
                    className="flex-1 py-2 rounded-lg border border-dashed border-neutral-300 dark:border-neutral-700 text-xs font-medium text-neutral-500 hover:text-blue-600 hover:border-blue-600 hover:bg-blue-50 dark:hover:bg-blue-950/20 transition flex items-center justify-center gap-1.5"
                  >
                    <Plus size={13} /> Add segment
                  </button>
                  <button className="flex-1 py-2 rounded-lg border border-dashed border-neutral-300 dark:border-neutral-700 text-xs font-medium text-neutral-500 hover:text-blue-600 hover:border-blue-600 hover:bg-blue-50 dark:hover:bg-blue-950/20 transition flex items-center justify-center gap-1.5">
                    <DoorOpen size={13} /> Add gate
                  </button>
                  <button className="px-3 py-2 rounded-lg border border-dashed border-neutral-300 dark:border-neutral-700 text-xs font-medium text-red-500 hover:bg-red-50 dark:hover:bg-red-950/20 transition flex items-center justify-center gap-1.5">
                    <Trash2 size={13} /> Remove run
                  </button>
                </div>
              </Section>
            </div>
          )
          }
        </div >

      );
    };

    // ---------- BOM panel ----------
    const BomPanel = ({ job, summary, bom }) => {
      const [activeTab, setActiveTab] = useState("all");
      const [extraItems, setExtraItems] = useState([]);
      const [extraSearch, setExtraSearch] = useState("");
      const [extraQty, setExtraQty] = useState(1);
      const [extraPrice, setExtraPrice] = useState("");
      const [addedAccessories, setAddedAccessories] = useState([]);
      const [dismissedSuggestions, setDismissedSuggestions] = useState(new Set());

      const grouped = useMemo(() => {
        const map = {};
        bom.items.forEach((it) => {
          if (!map[it.category]) map[it.category] = [];
          map[it.category].push(it);
        });
        return map;
      }, [bom.items]);

      const allCount = bom.items.length + extraItems.length + addedAccessories.length;

      const addAccessory = (acc) => {
        setAddedAccessories((prev) => {
          const exists = prev.find((a) => a.sku === acc.sku);
          if (exists) return prev.map((a) => a.sku === acc.sku ? { ...a, qty: a.qty + acc.qty } : a);
          return [...prev, { ...acc, price: acc.qty * acc.unitPrice }];
        });
        setDismissedSuggestions((prev) => new Set([...prev, acc.sku]));
      };

      const removeAccessory = (sku) => setAddedAccessories((prev) => prev.filter((a) => a.sku !== sku));

      const allItems = [
        ...bom.items,
        ...addedAccessories.map((a) => ({ ...a, category: "Added accessories" })),
        ...extraItems.map((e) => ({ ...e, category: "Extra items" })),
      ];
      const totalWithExtras = bom.subtotal
        + addedAccessories.reduce((s, a) => s + a.price, 0)
        + extraItems.reduce((s, e) => s + e.price, 0);
      const gstWithExtras = totalWithExtras * 0.1;

      return (
        <div className="rounded-xl border border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 overflow-hidden flex flex-col" style={{ height: "calc(100vh - 93px)" }}>

          {/* Blue header */}
          <div className="bg-blue-600 text-white px-5 py-4 flex items-start justify-between flex-shrink-0">
            <div>
              <h2 className="text-base font-semibold mb-0.5">Bill of Materials</h2>
              <div className="text-xs font-mono text-blue-100 tabular-nums">
                {job.system} · {summary.actualHeight}H × {(summary.totalLength * 1000).toFixed(0)}L · {job.colour} · {job.slatSize}mm / {job.gap}mm
              </div>
            </div>
            <div className="text-right">
              <div className="text-[10px] uppercase tracking-wider text-blue-200 mb-0.5">Auto quantity breaks</div>
              <div className="text-2xl font-bold font-mono tabular-nums">{fmtMoney(bom.total)}</div>
            </div>
          </div>

          {/* Action buttons */}
          <div className="px-4 py-2.5 border-b border-neutral-200 dark:border-neutral-800 flex gap-2 flex-shrink-0">
            <button className="flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-blue-600 text-white text-xs font-medium hover:bg-blue-700">
              <Download size={12} /> Generate BOM
            </button>
            <button className="flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-neutral-200 dark:border-neutral-700 text-xs font-medium hover:bg-neutral-50 dark:hover:bg-neutral-800">
              <Trash2 size={12} /> Clear BOM
            </button>
            <button className="flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-neutral-200 dark:border-neutral-700 text-xs font-medium hover:bg-neutral-50 dark:hover:bg-neutral-800">
              <Printer size={12} /> Print BOM
            </button>
            <button className="flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-neutral-200 dark:border-neutral-700 text-xs font-medium hover:bg-neutral-50 dark:hover:bg-neutral-800 ml-auto">
              <Download size={12} /> Export CSV
            </button>
          </div>

          {/* Tabs */}
          <div className="flex border-b border-neutral-200 dark:border-neutral-800 px-4 flex-shrink-0">
            {[
              { id: "all", label: "All Items", count: allCount },
              { id: "run1", label: "Run 1", count: bom.items.length },
              { id: "gates", label: "Gates", count: 0 },
            ].map((t) => (
              <button
                key={t.id}
                onClick={() => setActiveTab(t.id)}
                className={`px-3 py-2.5 text-xs font-medium border-b-2 -mb-px transition-colors flex items-center gap-1.5 ${activeTab === t.id
                    ? "border-blue-600 text-blue-600 dark:text-blue-400"
                    : "border-transparent text-neutral-500 hover:text-neutral-800 dark:hover:text-neutral-200"
                  }`}
              >
                {t.label}
                <span className={`px-1.5 py-0.5 rounded text-[10px] font-semibold ${activeTab === t.id ? "bg-blue-100 dark:bg-blue-950/50 text-blue-600 dark:text-blue-400" : "bg-neutral-100 dark:bg-neutral-800 text-neutral-500"
                  }`}>{t.count}</span>
              </button>
            ))}
          </div>

          {/* Scrollable body */}
          <div className="flex-1 overflow-y-auto">

            {/* BOM table */}
            <table className="w-full text-xs">
              <thead className="sticky top-0 z-10 bg-neutral-50 dark:bg-neutral-900 border-b border-neutral-200 dark:border-neutral-800">
                <tr className="text-[10px] uppercase tracking-wider text-neutral-500">
                  <th className="text-left px-4 py-2 font-medium w-32">Code</th>
                  <th className="text-left px-2 py-2 font-medium">Description</th>
                  <th className="text-right px-2 py-2 font-medium w-14">Unit</th>
                  <th className="text-right px-2 py-2 font-medium w-12">Qty</th>
                  <th className="text-right px-2 py-2 font-medium w-16">Unit $</th>
                  <th className="text-right px-2 py-2 font-medium w-16">Line $</th>
                  <th className="w-16" />
                </tr>
              </thead>
              <tbody>
                {Object.entries(grouped).map(([cat, items]) => (
                  <React.Fragment key={cat}>
                    <tr className="bg-neutral-50 dark:bg-neutral-900/60">
                      <td colSpan={7} className="px-4 py-1.5 text-[10px] font-semibold uppercase tracking-wider text-neutral-500 dark:text-neutral-400">
                        {cat}
                      </td>
                    </tr>
                    {items.map((it) => (
                      <tr key={it.sku} className="border-t border-neutral-100 dark:border-neutral-800/60 hover:bg-neutral-50 dark:hover:bg-neutral-900/40">
                        <td className="px-4 py-2.5">
                          <span className="font-mono text-blue-600 dark:text-blue-400 text-[11px] leading-tight block">{it.sku}</span>
                        </td>
                        <td className="px-2 py-2.5 text-neutral-700 dark:text-neutral-300 leading-snug">{it.desc}</td>
                        <td className="px-2 py-2.5 text-right text-neutral-500 tabular-nums">{it.unit}</td>
                        <td className="px-2 py-2.5 text-right font-mono tabular-nums font-medium">{it.qty}</td>
                        <td className="px-2 py-2.5 text-right font-mono tabular-nums text-neutral-600 dark:text-neutral-400">{fmtMoney(it.unitPrice)}</td>
                        <td className="px-2 py-2.5 text-right font-mono tabular-nums font-medium">{fmtMoney(it.price)}</td>
                        <td className="px-2 py-2.5 text-right">
                          <button className="text-[10px] text-red-500 hover:text-red-700 hover:underline">Remove</button>
                        </td>
                      </tr>
                    ))}
                  </React.Fragment>
                ))}
                {addedAccessories.length > 0 && (
                  <React.Fragment>
                    <tr className="bg-neutral-50 dark:bg-neutral-900/60">
                      <td colSpan={7} className="px-4 py-1.5 text-[10px] font-semibold uppercase tracking-wider text-neutral-500">Added accessories</td>
                    </tr>
                    {addedAccessories.map((it) => (
                      <tr key={it.sku} className="border-t border-neutral-100 dark:border-neutral-800/60 hover:bg-neutral-50 dark:hover:bg-neutral-900/40">
                        <td className="px-4 py-2.5"><span className="font-mono text-blue-600 dark:text-blue-400 text-[11px]">{it.sku}</span></td>
                        <td className="px-2 py-2.5 text-neutral-700 dark:text-neutral-300">{it.name}</td>
                        <td className="px-2 py-2.5 text-right text-neutral-500">ea</td>
                        <td className="px-2 py-2.5 text-right font-mono tabular-nums font-medium">{it.qty}</td>
                        <td className="px-2 py-2.5 text-right font-mono tabular-nums text-neutral-600 dark:text-neutral-400">{fmtMoney(it.unitPrice)}</td>
                        <td className="px-2 py-2.5 text-right font-mono tabular-nums font-medium">{fmtMoney(it.price)}</td>
                        <td className="px-2 py-2.5 text-right"><button onClick={() => removeAccessory(it.sku)} className="text-[10px] text-red-500 hover:text-red-700 hover:underline">Remove</button></td>
                      </tr>
                    ))}
                  </React.Fragment>
                )}
              </tbody>
            </table>

            {/* Suggested accessories */}
            <div className="border-t border-neutral-200 dark:border-neutral-800 px-4 py-3">
              <div className="text-[10px] font-semibold uppercase tracking-wider text-neutral-500 dark:text-neutral-400 mb-1">Suggested accessories</div>
              <p className="text-[11px] text-neutral-500 mb-3">Not included in the BOM until added.</p>
              <div className="space-y-2">
                {bom.suggested.filter((acc) => !dismissedSuggestions.has(acc.sku)).map((acc) => (
                  <div key={acc.sku} className="flex items-start gap-3 py-2 border-t border-neutral-100 dark:border-neutral-800/60">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-0.5">
                        <span className="font-mono text-[11px] text-blue-600 dark:text-blue-400">{acc.sku}</span>
                        <span className="text-xs font-medium text-neutral-700 dark:text-neutral-300 truncate">{acc.name}</span>
                      </div>
                      <p className="text-[11px] text-neutral-500 leading-snug">{acc.desc}</p>
                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0 text-[11px] text-neutral-500 mt-0.5">
                      <span>Qty <span className="font-mono font-medium text-neutral-700 dark:text-neutral-300">{acc.qty}</span></span>
                      <span>·</span>
                      <span className="font-mono font-medium text-neutral-700 dark:text-neutral-300">{fmtMoney(acc.unitPrice)}</span>
                      <button
                        onClick={() => addAccessory(acc)}
                        className="flex items-center gap-1 px-2.5 py-1 rounded-md text-[11px] font-medium bg-blue-50 dark:bg-blue-950/30 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-950/50 transition"
                      >
                        <Plus size={10} /> Add
                      </button>
                    </div>
                  </div>
                ))}
                {bom.suggested.every((acc) => dismissedSuggestions.has(acc.sku)) && (
                  <p className="text-[11px] text-neutral-400 italic py-1">All suggestions added.</p>
                )}
              </div>
            </div>
          </div>{/* end scrollable */}

          {/* Extra items — fixed */}
          <div className="border-t border-neutral-200 dark:border-neutral-800 px-4 py-3 flex-shrink-0">
            <div className="text-[10px] font-semibold uppercase tracking-wider text-neutral-500 dark:text-neutral-400 mb-2">Extra items</div>
            <div className="flex gap-2 items-center">
              <input
                type="text"
                placeholder="Search SKU / description…"
                value={extraSearch}
                onChange={(e) => setExtraSearch(e.target.value)}
                className="flex-1 px-3 py-1.5 rounded-lg bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 text-xs focus:border-blue-600 focus:ring-2 focus:ring-blue-600/20 outline-none"
              />
              <input
                type="number"
                value={extraQty}
                min={1}
                onChange={(e) => setExtraQty(parseInt(e.target.value) || 1)}
                className="w-14 px-2 py-1.5 rounded-lg bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 text-xs font-mono text-center outline-none focus:border-blue-600"
              />
              <input
                type="number"
                placeholder="Unit $"
                value={extraPrice}
                onChange={(e) => setExtraPrice(e.target.value)}
                className="w-20 px-2 py-1.5 rounded-lg bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 text-xs font-mono outline-none focus:border-blue-600"
              />
              <button
                onClick={() => {
                  if (!extraSearch.trim()) return;
                  const p = parseFloat(extraPrice) || 0;
                  setExtraItems((prev) => [...prev, {
                    sku: extraSearch.trim().toUpperCase(),
                    desc: extraSearch.trim(),
                    qty: extraQty,
                    unit: "ea",
                    unitPrice: p,
                    price: extraQty * p,
                  }]);
                  setExtraSearch(""); setExtraPrice(""); setExtraQty(1);
                }}
                className="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-blue-600 text-white text-xs font-medium hover:bg-blue-700"
              >
                <Plus size={11} /> Add
              </button>
            </div>
            {extraItems.length > 0 && (
              <div className="mt-2 space-y-1">
                {extraItems.map((e, i) => (
                  <div key={i} className="flex items-center gap-2 text-xs py-1 border-t border-neutral-100 dark:border-neutral-800/60">
                    <span className="font-mono text-blue-600 dark:text-blue-400 text-[11px] w-28 truncate">{e.sku}</span>
                    <span className="flex-1 text-neutral-700 dark:text-neutral-300 truncate">{e.desc}</span>
                    <span className="font-mono tabular-nums text-neutral-500 w-8 text-right">{e.qty}</span>
                    <span className="font-mono tabular-nums w-16 text-right">{fmtMoney(e.price)}</span>
                    <button onClick={() => setExtraItems((prev) => prev.filter((_, j) => j !== i))} className="text-[10px] text-red-500 hover:underline">Remove</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Totals — fixed */}
          <div className="border-t-2 border-neutral-200 dark:border-neutral-700 px-4 py-3 space-y-1.5 bg-neutral-50/50 dark:bg-neutral-900/30 flex-shrink-0">
            <div className="flex items-center justify-between text-xs text-neutral-600 dark:text-neutral-400">
              <span>Subtotal (ex-GST)</span>
              <span className="font-mono tabular-nums">{fmtMoney(totalWithExtras)}</span>
            </div>
            <div className="flex items-center justify-between text-xs text-neutral-500">
              <span>GST (10%)</span>
              <span className="font-mono tabular-nums">{fmtMoney(gstWithExtras)}</span>
            </div>
            <div className="h-px bg-neutral-200 dark:bg-neutral-700" />
            <div className="flex items-center justify-between">
              <span className="text-sm font-semibold">Total (inc. GST)</span>
              <span className="font-mono tabular-nums text-xl font-bold text-blue-600 dark:text-blue-400">{fmtMoney(totalWithExtras + gstWithExtras)}</span>
            </div>
          </div>

        </div>
      );
    };

    // ---------- Main app ----------
    function App() {
      const [job, setJob] = useState(initialJob);
      const [dark, setDark] = useState(false);

      const summary = useMemo(() => computeRunSummary(job), [job]);
      const bom = useMemo(() => generateBOM(job), [job]);

      return (
        <div className={dark ? "dark" : ""}>
          <div
            className="min-h-screen bg-neutral-100 dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100"
            style={{ fontFamily: '"Inter Tight", "SF Pro Display", system-ui, sans-serif' }}
          >
            {/* Top bar */}
            <header className="sticky top-0 z-30 border-b border-neutral-200 dark:border-neutral-800 bg-white/90 dark:bg-neutral-950/90 backdrop-blur-md">
              <div className="px-5 py-3 flex items-center gap-4">
                <div className="px-2 py-1 rounded bg-blue-600 text-white text-[10px] font-bold tracking-wider">
                  SKYBROOKAI
                </div>
                <div className="h-5 w-px bg-neutral-300 dark:bg-neutral-700" />
                <div>
                  <div className="text-sm font-semibold leading-tight">The Glass Outlet</div>
                  <div className="text-[11px] text-neutral-500 leading-tight">
                    QuickScreen BOM Generator
                  </div>
                </div>
                <div className="flex-1" />
                <button
                  onClick={() => setDark((d) => !d)}
                  className="p-1.5 text-neutral-500 hover:text-neutral-900 dark:hover:text-white"
                >
                  {dark ? <Sun size={16} /> : <Moon size={16} />}
                </button>
              </div>
            </header>

            {/* Two-column layout */}
            <div className="grid gap-5 p-5 max-w-[1600px] mx-auto" style={{ gridTemplateColumns: "minmax(0,1fr) minmax(0,1.3fr)" }}>
              {/* LEFT: Configuration */}
              <div className="space-y-4">
                {/* Job + map */}
                <div className="rounded-xl border border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 p-4 space-y-3">
                  <Field label="Job name">
                    <input
                      type="text"
                      placeholder="Enter job name"
                      value={job.name}
                      onChange={(e) => setJob({ ...job, name: e.target.value })}
                      className="w-full px-3 py-2 rounded-lg bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 text-sm focus:border-blue-600 focus:ring-2 focus:ring-blue-600/20 outline-none transition"
                    />
                  </Field>
                  <button className="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-lg border border-neutral-200 dark:border-neutral-700 text-sm font-medium text-neutral-700 dark:text-neutral-300 hover:bg-neutral-50 dark:hover:bg-neutral-900">
                    <MapIcon size={14} /> Open layout map
                  </button>
                </div>

                {/* Run card */}
                <div>
                  <div className="text-[11px] font-semibold uppercase tracking-wider text-neutral-500 mb-2 px-1">
                    Runs
                  </div>
                  <RunCard job={job} onChange={setJob} summary={summary} />
                  <button className="w-full mt-3 px-3 py-2.5 rounded-lg border border-dashed border-neutral-300 dark:border-neutral-700 text-sm font-medium text-neutral-500 hover:text-blue-600 hover:border-blue-600 hover:bg-blue-50 dark:hover:bg-blue-950/20 transition flex items-center justify-center gap-1.5">
                    <Plus size={14} /> Add run
                  </button>
                </div>

                {/* Footer actions */}
                <div className="flex gap-2 pt-1">
                  <button className="flex items-center gap-1.5 px-4 py-2 rounded-lg bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 text-sm font-medium hover:opacity-90">
                    <Save size={14} /> Save Job
                  </button>
                  <button className="flex items-center gap-1.5 px-4 py-2 rounded-lg border border-neutral-200 dark:border-neutral-700 text-sm font-medium text-red-600 hover:bg-red-50 dark:hover:bg-red-950/20">
                    <Trash2 size={14} /> Clear Job
                  </button>
                </div>
              </div>

              {/* RIGHT: BOM (sticky) */}
              <div className="sticky top-[73px] self-start">
                <BomPanel job={job} summary={summary} bom={bom} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
